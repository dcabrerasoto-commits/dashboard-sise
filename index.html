<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard SISE 2026</title>
    <link rel="stylesheet" href="styles.css?v=20260526-print-comunal-flujo">
    <style>
        .toolbar {
            top: 8px !important;
            z-index: 90 !important;
            margin-bottom: 16px !important;
            background: linear-gradient(135deg, #17396f 0%, #1a4080 58%, #25559b 100%) !important;
            border: 1px solid #17396f !important;
            box-shadow: 0 14px 30px rgba(26, 64, 128, 0.22) !important;
        }
        .toolbar .toolbar-title,
        .toolbar .toolbar-meta,
        .toolbar .toolbar-meta strong {
            color: #ffffff !important;
        }
        .toolbar-meta {
            color: rgba(255, 255, 255, 0.88) !important;
        }
        .month-group {
            background: rgba(255, 255, 255, 0.14) !important;
            border: 1px solid rgba(255, 255, 255, 0.22) !important;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.18) !important;
            backdrop-filter: blur(6px);
        }
        .month-btn {
            color: #ffffff !important;
            background: transparent !important;
            border: 1px solid transparent !important;
        }
        .month-btn:hover {
            background: rgba(255, 255, 255, 0.12) !important;
        }
        .month-btn.active {
            background: #ffffff !important;
            color: #17396f !important;
            border-color: #ffffff !important;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.20) !important;
        }
        .export-btn {
            background: #ffffff !important;
            color: #17396f !important;
            border: 1px solid #ffffff !important;
        }
        .export-btn:hover {
            background: #f3f6fb !important;
        }
        .mid-section {
            background: #eaf2fc !important;
            border: 1px solid rgba(26, 64, 128, 0.10) !important;
            border-radius: 16px !important;
            padding: 12px !important;
            gap: 12px !important;
            box-shadow: 0 10px 24px rgba(26, 64, 128, 0.07) !important;
        }
        .mid-section > .table-section {
            background: transparent !important;
            border: 0 !important;
            box-shadow: none !important;
            padding: 8px 8px 10px !important;
        }
        .mid-section .table-section:hover,
        .mid-section .insight-card:hover {
            transform: none !important;
            box-shadow: none !important;
        }
        .mid-section .insight-card {
            background: rgba(255, 255, 255, 0.54) !important;
            border: 1px solid rgba(214, 219, 228, 0.42) !important;
            box-shadow: none !important;
        }
        .table-section .section-title {
            display: inline-flex !important;
            align-items: center !important;
            width: auto !important;
            padding: 6px 10px !important;
            margin-bottom: 7px !important;
            border-radius: 999px !important;
            background: #17396f !important;
            color: #ffffff !important;
        }
        .table-section .section-note {
            margin-bottom: 8px !important;
            color: #475569 !important;
        }
        .fixed-data-table {
            background: #ffffff !important;
            border: 1px solid rgba(214, 219, 228, 0.55) !important;
            border-radius: 10px !important;
            box-shadow: 0 8px 18px rgba(26, 64, 128, 0.05) !important;
            overflow: hidden !important;
        }
        tr.region-group-par td {
            background: #ffffff !important;
        }
        tr.region-group-impar td {
            background: #f5f8fc !important;
        }
        .subfila-institucion td {
            background: #edf2f7 !important;
            color: #475569 !important;
            border-top: 0 !important;
        }
        .subfila-institucion td:first-child::before {
            color: #1a4080 !important;
        }
        .modal-card {
            background: #eaf2fc !important;
        }
        .modal-header {
            background: rgba(255, 255, 255, 0.54) !important;
            border: 1px solid rgba(214, 219, 228, 0.42) !important;
            border-radius: 10px !important;
            padding: 8px 10px !important;
        }
        .modal-card .table-section {
            max-height: 52vh;
            overflow: auto !important;
            background: transparent !important;
            border: 0 !important;
            box-shadow: none !important;
        }
        .modal-card .fixed-data-table thead {
            position: sticky;
            top: 0;
            z-index: 55;
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.16);
        }
        .modal-card .fixed-data-table thead th {
            position: static !important;
            top: auto !important;
            z-index: auto !important;
            background: #17396f;
            background-clip: padding-box;
        }
        @media (max-width: 760px) {
            body {
                overflow-x: hidden !important;
            }
            .container {
                width: 100% !important;
                max-width: 100% !important;
            }
            .toolbar {
                top: 6px !important;
                display: grid !important;
                grid-template-columns: 1fr !important;
                gap: 8px !important;
                padding: 8px 10px !important;
                border-radius: 10px !important;
                margin-bottom: 12px !important;
            }
            .toolbar .toolbar-title {
                margin-bottom: 4px !important;
                font-size: 10px !important;
                letter-spacing: 0.7px !important;
            }
            .toolbar-actions {
                width: 100% !important;
                display: flex !important;
                justify-content: space-between !important;
                align-items: center !important;
                gap: 8px !important;
            }
            .toolbar-meta {
                display: none !important;
            }
            .month-group {
                flex-wrap: nowrap !important;
                overflow-x: auto !important;
                max-width: 100% !important;
                padding: 2px !important;
                gap: 4px !important;
                scrollbar-width: thin;
            }
            .month-btn {
                flex: 0 0 auto !important;
                padding: 7px 10px !important;
                font-size: 12px !important;
            }
            .export-btn {
                padding: 8px 10px !important;
                font-size: 12px !important;
                white-space: nowrap !important;
            }
            .export-menu {
                right: 0 !important;
                min-width: min(290px, calc(100vw - 32px)) !important;
            }
            .mid-section {
                padding: 8px !important;
                border-radius: 12px !important;
            }
            .table-section {
                width: 100% !important;
                max-width: 100% !important;
                overflow-x: auto !important;
                -webkit-overflow-scrolling: touch;
                padding: 12px 10px !important;
            }
            .table-section .section-title,
            .table-section .section-note {
                white-space: normal !important;
            }
            .fixed-data-table {
                min-width: 760px !important;
                table-layout: fixed !important;
                font-size: 11px !important;
            }
            .fixed-data-table th {
                padding: 8px 7px !important;
                font-size: 10px !important;
                line-height: 1.2 !important;
                white-space: normal !important;
            }
            .fixed-data-table td {
                padding: 6px 7px !important;
                font-size: 11px !important;
                line-height: 1.25 !important;
                white-space: nowrap !important;
            }
            .percent-header small {
                font-size: 8.5px !important;
                line-height: 1.15 !important;
            }
            .subfila-institucion td {
                font-size: 9px !important;
                padding-top: 3px !important;
                padding-bottom: 3px !important;
            }
            .subfila-institucion td:first-child {
                padding-left: 28px !important;
            }
            .subfila-institucion td:first-child::before {
                left: 18px !important;
            }
            .badge-principal {
                padding: 2px 6px !important;
                font-size: 10px !important;
            }
            .modal-backdrop {
                padding: 8px !important;
                align-items: stretch !important;
            }
            .modal-card {
                width: 100% !important;
                max-height: calc(100vh - 16px) !important;
                padding: 12px !important;
                border-radius: 10px !important;
            }
            .modal-header {
                gap: 10px !important;
                margin-bottom: 12px !important;
            }
            .modal-title {
                font-size: 19px !important;
            }
            .modal-subtitle {
                font-size: 12px !important;
            }
            .modal-close {
                padding: 7px 9px !important;
                font-size: 12px !important;
            }
            .modal-card .table-section {
                max-height: 50vh !important;
                padding: 0 !important;
                overflow: auto !important;
            }
            .modal-card .fixed-data-table {
                min-width: 720px !important;
            }
            .modal-kpi-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
                gap: 8px !important;
            }
            .modal-kpi-grid .kpi-card {
                min-height: 96px !important;
                padding: 9px 10px !important;
            }
            .modal-kpi-grid .kpi-value {
                font-size: 24px !important;
            }
            .modal-kpi-grid .kpi-subgrupo {
                min-height: 72px !important;
                padding: 7px 9px !important;
            }
            .modal-kpi-grid .kpi-subgrupo .kpi-value {
                font-size: 19px !important;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="comunas_oficiales.js"></script>
</head>
<body>
<div class="container">
    <header>
        <div class="header-left">
            <div class="logo-strip"></div>
            <div>
                <h1>Dashboard Acreditaciones SISE 2026</h1>
                <p class="subtitle">Sistema de Información Social en Emergencias - Ministerio de Desarrollo Social y Familia</p>
            </div>
        </div>
    </header>
    <div class="info-msg" id="infoMsg" style="display:block; margin-bottom:16px;">Cargando datos automáticamente desde la fuente publicada...</div><div class="error-msg" id="errorMsg"></div><div id="dashboardSection">
        <div id="content"></div>
    </div>
    </div>
<div class="modal-backdrop" id="comunaModal" onclick="cerrarModalComuna(event)">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div class="modal-header">
            <div>
                <div class="section-title" id="comunaModalSectionTitle" style="margin-bottom:6px;">Desglose por comuna</div>
                <div class="modal-title" id="comunaModalTitle">Región</div>
                <div class="modal-subtitle" id="comunaModalSubtitle"></div>
            </div>
            <button class="modal-close" type="button" onclick="cerrarModalComuna()">Cerrar</button>
        </div>
        <div id="comunaModalContent"></div>
    </div>
</div>
<script src="data.js?v=20260525-lectura-conceptual"></script>
<script src="export.js?v=20260525-lectura-conceptual"></script>
<script src="charts.js?v=20260525-jerarquia-color"></script>
<script src="app.js?v=20260526-definiciones-tablas"></script>
</body>
</html>
