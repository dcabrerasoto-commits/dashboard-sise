<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard SISE 2026</title>
    <link rel="stylesheet" href="styles.css?v=20260522-toolbar-azul-oscuro">
    <style>
        .toolbar {
            background: linear-gradient(135deg, #17396f 0%, #1a4080 58%, #25559b 100%) !important;
            border: 1px solid #17396f !important;
            border-top: 3px solid #f59e0b !important;
            box-shadow: 0 14px 30px rgba(26, 64, 128, 0.22) !important;
        }
        .toolbar .toolbar-title,
        .toolbar .toolbar-meta,
        .toolbar .toolbar-meta strong {
            color: #ffffff !important;
        }
        .toolbar-meta {
            color: rgba(255, 255, 255, 0.88) !important;
        }
        .month-group {
            background: rgba(255, 255, 255, 0.14) !important;
            border: 1px solid rgba(255, 255, 255, 0.22) !important;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.18) !important;
            backdrop-filter: blur(6px);
        }
        .month-btn {
            color: #ffffff !important;
            background: transparent !important;
            border: 1px solid transparent !important;
        }
        .month-btn:hover {
            background: rgba(255, 255, 255, 0.12) !important;
        }
        .month-btn.active {
            background: #ffffff !important;
            color: #17396f !important;
            border-color: #ffffff !important;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.20) !important;
        }
        .export-btn {
            background: #ffffff !important;
            color: #17396f !important;
            border: 1px solid #ffffff !important;
        }
        .export-btn:hover {
            background: #f3f6fb !important;
        }
        .modal-card .table-section {
            max-height: 52vh;
            overflow: auto !important;
        }
        .modal-card .fixed-data-table thead {
            position: sticky;
            top: 0;
            z-index: 55;
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.16);
        }
        .modal-card .fixed-data-table thead th {
            position: static !important;
            top: auto !important;
            z-index: auto !important;
            background: #17396f;
            background-clip: padding-box;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="comunas_oficiales.js"></script>
</head>
<body>
<div class="container">
    <header>
        <div class="header-left">
            <div class="logo-strip"></div>
            <div>
                <h1>Dashboard Acreditaciones SISE 2026</h1>
                <p class="subtitle">Sistema de Información Social en Emergencias - Ministerio de Desarrollo Social y Familia</p>
            </div>
        </div>
    </header>
    <div class="info-msg" id="infoMsg" style="display:block; margin-bottom:16px;">Cargando datos automáticamente desde la fuente publicada...</div><div class="error-msg" id="errorMsg"></div><div id="dashboardSection">
        <div id="content"></div>
    </div>
    </div>
<div class="modal-backdrop" id="comunaModal" onclick="cerrarModalComuna(event)">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div class="modal-header">
            <div>
                <div class="section-title" id="comunaModalSectionTitle" style="margin-bottom:6px;">Desglose por comuna</div>
                <div class="modal-title" id="comunaModalTitle">Región</div>
                <div class="modal-subtitle" id="comunaModalSubtitle"></div>
            </div>
            <button class="modal-close" type="button" onclick="cerrarModalComuna()">Cerrar</button>
        </div>
        <div id="comunaModalContent"></div>
    </div>
</div>
<script src="data.js?v=20260522-sticky-metodo"></script>
<script src="export.js?v=20260522-ejecutivo"></script>
<script src="charts.js?v=20260522-ejecutivo"></script>
<script src="app.js?v=20260522-encabezados-ok"></script>
</body>
</html>
