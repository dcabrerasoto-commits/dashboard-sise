<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard SISE 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="comunas_oficiales.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --azul-sise: #1a4080;
            --azul-secundario: #2c5aa0;
            --verde: #1a7a4a;
            --ambar: #b45309;

        }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top right, rgba(44, 90, 160, 0.10), transparent 22%), linear-gradient(180deg, #f4f7fb 0%, #edf2f8 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--gris-texto);
        }
        .container { max-width: 1480px; margin: 0 auto; }
        header, .panel, .upload-section, .chart-card, .table-section, .insight-card, .map-card, .footer-card, .kpi-card { background: white; border: 1px solid var(--borde); border-radius: 10px; box-shadow: var(--sombra); }
        header {
            background: linear-gradient(135deg, #17396f 0%, #1a4080 58%, #25559b 100%);
            color: white; padding: 24px 30px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; gap: 24px;
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo-strip { width: 6px; height: 58px; background: #f59e0b; border-radius: 3px; flex-shrink: 0; }
        h1 { font-size: 24px; font-weight: 700; letter-spacing: 0.2px; }
        .subtitle { font-size: 13px; opacity: 0.88; margin-top: 4px; }
        .header-meta { min-width: 240px; padding: 14px 16px; border-radius: 10px; background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.14); }
        .meta-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; opacity: 0.8; margin-bottom: 4px; }
        .meta-value { font-size: 14px; font-weight: 600; line-height: 1.5; }
        .upload-section { padding: 40px 30px; margin-bottom: 24px; text-align: center; }
        .upload-zone { padding: 30px; border: 2px dashed var(--azul-secundario); border-radius: 10px; cursor: pointer; transition: background 0.2s ease; margin-bottom: 16px; background: linear-gradient(180deg, #ffffff 0%, #f7faff 100%); }
        .upload-zone:hover { background: #f0f5fc; }
        .upload-zone p { margin-bottom: 8px; font-size: 16px; font-weight: 600; }
        .upload-zone small { color: #64748b; }
        .source-box { margin-top: 16px; padding: 12px 14px; border: 1px solid #d7e0ee; border-radius: 8px; background: #f8fbff; text-align: left; }
        .source-box label { display: block; font-size: 12px; font-weight: 700; color: var(--azul-sise); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
        .source-box input { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; }
        .source-actions { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; }
        input[type="file"] { display: none; }
        .upload-btn, .btn-volver, .month-btn { border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease, background 0.18s ease, color 0.18s ease; position: relative; overflow: hidden; }
        .upload-btn { background: var(--azul-sise); color: white; padding: 11px 28px; font-size: 15px; }
        .upload-btn.secundario { background: #eef3fb; color: var(--azul-sise); border: 1px solid #d7e0ee; }
        .btn-volver { background: white; border: 1px solid var(--azul-sise); color: var(--azul-sise); padding: 8px 18px; font-size: 13px; margin-bottom: 20px; }
        .upload-btn::before, .btn-volver::before, .month-btn::before, .export-btn::before, .modal-close::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, rgba(255,255,255,0) 18%, rgba(255,255,255,0.16) 50%, rgba(255,255,255,0) 82%);
            transform: translateX(-130%);
            transition: transform 0.35s ease;
            pointer-events: none;
        }
        .btn-volver:hover, .upload-btn:hover, .month-btn:hover, .export-btn:hover, .modal-close:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(26, 64, 128, 0.18);
            filter: brightness(1.03);
        }
        .btn-volver:hover::before, .upload-btn:hover::before, .month-btn:hover::before, .export-btn:hover::before, .modal-close:hover::before {
            transform: translateX(130%);
        }
        .btn-volver:active, .upload-btn:active, .month-btn:active, .export-btn:active, .modal-close:active {
            transform: translateY(0);
            box-shadow: 0 4px 10px rgba(26, 64, 128, 0.14);
        }
        .error-msg, .info-msg { display: none; margin-top: 16px; padding: 12px 16px; border-radius: 8px; text-align: left; white-space: pre-line; font-size: 14px; }
        .error-msg { background: #fef2f2; border: 1px solid #fca5a5; color: var(--rojo); }
        .info-msg { background: #eff6ff; border: 1px solid #93c5fd; color: var(--azul-sise); }
        .hidden { display: none; }
        .executive-band, .charts-section, .mid-section, .footer-grid, .kpi-section { display: grid; gap: 16px; }
        .executive-band { grid-template-columns: 2fr 1fr; margin-bottom: 20px; }
        .charts-section { grid-template-columns: 1.25fr 0.75fr; margin-bottom: 22px; }
        .mid-section { grid-template-columns: 1.45fr 0.55fr; margin-bottom: 22px; align-items: start; }
        .footer-grid { grid-template-columns: minmax(240px, 0.8fr) minmax(420px, 1.2fr); gap: 18px; align-items: start; }
        .kpi-section { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); margin-bottom: 22px; }
        .executive-main, .executive-side, .chart-card, .table-section, .insight-card, .map-card, .footer-card, .kpi-card { padding: 18px 20px; }
        .executive-main, .executive-side { padding: 14px 16px; }
        .executive-title, .toolbar-title, .section-title, .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; color: var(--azul-secundario); }
        .executive-title, .toolbar-title, .section-title { margin-bottom: 8px; }
        .executive-text { font-size: 16px; line-height: 1.45; color: #17396f; font-weight: 600; }
        .executive-side .executive-text { font-size: 13px; font-weight: 500; color: var(--gris-texto); }
        .toolbar { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 16px; padding: 18px 20px; margin-bottom: 20px; }
        .toolbar-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .export-wrap { position: relative; }
        .export-btn { background: var(--azul-sise); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; padding: 10px 14px; font-size: 13px; position: relative; overflow: hidden; }
        .export-menu { position: absolute; top: calc(100% + 8px); right: 0; min-width: 290px; background: white; border: 1px solid #d7e0ee; border-radius: 10px; box-shadow: var(--sombra); padding: 8px; display: none; z-index: 40; }
        .export-menu.visible { display: block; }
        .export-option { width: 100%; border: none; background: white; text-align: left; padding: 10px 12px; border-radius: 8px; font-size: 13px; color: var(--gris-texto); cursor: pointer; }
        .export-option:hover { background: #f3f6fb; }
        .export-option:disabled { color: #94a3b8; cursor: not-allowed; }
        .export-hint { padding: 8px 12px 4px; font-size: 12px; color: #64748b; line-height: 1.4; }
        .month-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .month-btn { padding: 10px 14px; background: #f3f6fb; color: var(--azul-sise); border: 1px solid #d7e0ee; font-size: 13px; }
        .month-btn.active { background: var(--azul-sise); color: white; border-color: var(--azul-sise); box-shadow: 0 8px 18px rgba(26, 64, 128, 0.18); }
        .toolbar-meta, .section-note, .footer-item, .kpi-percent { font-size: 13px; color: #64748b; line-height: 1.5; }
        .kpi-card { border-top: 4px solid var(--azul-sise); transition: transform 0.22s ease, box-shadow 0.22s ease; transform-style: preserve-3d; }
        .kpi-card:hover { transform: translateY(-4px); box-shadow: 0 18px 30px rgba(26, 64, 128, 0.14); }
        .kpi-card.azul { background: linear-gradient(135deg, #17396f 0%, #1a4080 58%, #25559b 100%); color: white; border-top-color: #0f2f5f; }
        .kpi-card.verde { border-top-color: var(--verde); }
        .kpi-card.ambar { border-top-color: var(--ambar); }
        .kpi-card.rojo { border-top-color: var(--rojo); }
        .kpi-value { font-size: 34px; font-weight: 700; color: var(--azul-sise); margin: 6px 0 4px; }
        .kpi-card.azul .kpi-label, .kpi-card.azul .kpi-value, .kpi-card.azul .kpi-percent { color: white; }
        .kpi-card.azul .kpi-label { opacity: 0.9; }
        .kpi-card.azul .kpi-percent { opacity: 0.9; }
        .kpi-card.verde .kpi-value { color: var(--verde); }
        .kpi-card.ambar .kpi-value { color: var(--ambar); }
        .kpi-card.rojo .kpi-value { color: var(--rojo); }
        .kpi-delta, .badge { display: inline-block; padding: 4px 9px; border-radius: 999px; font-size: 12px; font-weight: 700; }
        .delta-up, .badge-verde { background: #dcfce7; color: #166534; }
        .delta-down, .badge-rojo { background: #fee2e2; color: #991b1b; }
        .delta-flat, .badge-ambar { background: #fef3c7; color: #92400e; }
        .chart-canvas-wrap { position: relative; height: 230px; }
        .chart-canvas-wrap.compact { height: 170px; max-width: 280px; margin: 0 auto; }
        .insight-list { display: grid; gap: 10px; }
        .chart-card { transition: transform 0.22s ease, box-shadow 0.22s ease; transform-style: preserve-3d; }
        .chart-card:hover { transform: translateY(-4px); box-shadow: 0 18px 30px rgba(26, 64, 128, 0.14); }
        .insight-item { background: linear-gradient(180deg, #f8fbff 0%, #f2f6fc 100%); border: 1px solid #dbe5f3; border-radius: 8px; padding: 12px 14px; line-height: 1.5; font-size: 14px; transition: transform 0.18s ease, box-shadow 0.18s ease; }
        .insight-item:hover { transform: translateX(4px); box-shadow: 0 8px 18px rgba(26, 64, 128, 0.10); }
        .table-section { overflow-x: auto; }
        .panel, .table-section, .insight-card, .footer-card, .map-card { transition: transform 0.22s ease, box-shadow 0.22s ease; transform-style: preserve-3d; }
        .panel:hover, .table-section:hover, .insight-card:hover, .footer-card:hover, .map-card:hover { transform: translateY(-3px); box-shadow: 0 16px 28px rgba(26, 64, 128, 0.12); }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: var(--azul-sise); color: white; padding: 11px 14px; text-align: left; font-weight: 700; font-size: 13px; }
        td { padding: 11px 14px; border-bottom: 1px solid #edf1f6; vertical-align: middle; }
        tr:hover td { background: #f7faff; }
        tr.region-group-par td { background: #ffffff; }
        tr.region-group-impar td { background: #f7fafd; }
        .region-cell-button { background: none; border: none; padding: 2px 0; color: var(--azul-sise); font: inherit; font-weight: 700; cursor: pointer; text-align: left; transition: transform 0.18s ease, color 0.18s ease, letter-spacing 0.18s ease; }
        .region-cell-button:hover { text-decoration: none; color: #102f5d; transform: translateX(4px); letter-spacing: 0.15px; }
        .subfila-institucion td { font-size: 10px; color: #748396; padding-top: 4px; padding-bottom: 6px; }
        .subfila-institucion td:first-child { font-weight: 400; color: #748396; }
        .subfila-institucion td:not(:first-child) { border-top: 1px dashed #d8e2f0; }
        .metric-cell { min-width: 190px; }
        .metric-value { font-weight: 700; color: #17396f; }
        .metric-share { margin-top: 4px; font-size: 11px; color: #64748b; line-height: 1.35; }
        .subfila-institucion td:last-child { text-align: center; }
        .subfila-placeholder { width: 100%; display: flex; align-items: center; justify-content: center; color: #9aa9bb; }
        .percent-cell { min-width: 180px; }
        .data-bar { height: 10px; border-radius: 999px; background: #eef2f7; overflow: hidden; margin-bottom: 6px; }
        .data-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #7aa4df 0%, #2c5aa0 100%); }
        .footer-item strong { color: var(--azul-sise); display: block; margin-bottom: 4px; }
        .footer-item.metodologia { max-width: 760px; }
        .modal-backdrop { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.45); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 1000; }
        .modal-backdrop.visible { display: flex; }
        .modal-card { width: min(980px, 100%); max-height: 85vh; overflow: auto; background: white; border: 1px solid var(--borde); border-radius: 12px; box-shadow: 0 18px 40px rgba(15, 23, 42, 0.18); padding: 20px; }
        .modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
        .modal-title { font-size: 22px; font-weight: 700; color: #17396f; }
        .modal-subtitle { font-size: 13px; color: #64748b; margin-top: 4px; line-height: 1.5; }
        .modal-close { border: 1px solid #cbd5e1; background: white; color: var(--azul-sise); border-radius: 8px; padding: 8px 12px; cursor: pointer; font-weight: 700; position: relative; overflow: hidden; transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease; }
        .modal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .modal-stat { background: linear-gradient(180deg, #f8fbff 0%, #f2f6fc 100%); border: 1px solid #dbe5f3; border-radius: 10px; padding: 14px 15px; }
        .modal-stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px; font-weight: 700; color: var(--azul-secundario); margin-bottom: 6px; }
        .modal-stat-value { font-size: 26px; font-weight: 700; color: #17396f; }
        .modal-empty { background: #f8fbff; border: 1px solid #dbe5f3; border-radius: 10px; padding: 15px; color: #475569; line-height: 1.6; }
        @media (max-width: 1100px) { .charts-section, .mid-section, .executive-band, .footer-grid { grid-template-columns: 1fr; } .toolbar-meta { text-align: left; } }
        @media (max-width: 760px) { header { flex-direction: column; align-items: flex-start; } .header-meta { width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="header-left">
            <div class="logo-strip"></div>
            <div>
                <h1>Dashboard Acreditaciones SISE 2026</h1>
                <p class="subtitle">Sistema de Información Social en Emergencias - Ministerio de Desarrollo Social y Familia</p>
            </div>
        </div>
        <div class="header-meta">
            <div class="meta-label">Enfoque</div>
            <div class="meta-value">Seguimiento mensual de estados de acreditación</div>
        </div>
    </header>
    <div class="info-msg" id="infoMsg" style="display:block; margin-bottom:16px;">Cargando datos automáticamente desde la fuente publicada...</div><div class="error-msg" id="errorMsg"></div><div id="dashboardSection">
        <div id="content"></div>
    </div>
    </div>
<div class="modal-backdrop" id="comunaModal" onclick="cerrarModalComuna(event)">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div class="modal-header">
            <div>
                <div class="section-title" id="comunaModalSectionTitle" style="margin-bottom:6px;">Desglose por comuna</div>
                <div class="modal-title" id="comunaModalTitle">Región</div>
                <div class="modal-subtitle" id="comunaModalSubtitle"></div>
            </div>
            <button class="modal-close" type="button" onclick="cerrarModalComuna()">Cerrar</button>
        </div>
        <div id="comunaModalContent"></div>
    </div>
</div>
<script>
    let chartEstado = null;
    let chartRegion = null;
    let chartTendencia = null;
    let dashboardData = null;
    let currentMonthIndex = 0;
    let modalRegionActual = null;
    let regionSeleccionada = null;
    const AUTO_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQp3xmjVpjlQTcHdHxM69Jju6ZOJuE2jm58gWU7owObfGoL0PTzHAgWiDR2i8ri-anb0c7j_p4ffjJb/pub?gid=1955078176&single=true&output=csv";
    
    const ORDEN_REGIONES = ["ARICA Y PARINACOTA","TARAPACA","ANTOFAGASTA","ATACAMA","COQUIMBO","VALPARAISO","METROPOLITANA","OHIGGINS","MAULE","NUBLE","BIO BIO","LA ARAUCANIA","LOS RIOS","LOS LAGOS","AYSEN","MAGALLANES","NIVEL CENTRAL"];
    const ETIQUETAS_REGION = {"NIVEL CENTRAL":"Nivel Central","ARICA Y PARINACOTA":"Arica y Parinacota","TARAPACA":"Tarapacá","ANTOFAGASTA":"Antofagasta","ATACAMA":"Atacama","COQUIMBO":"Coquimbo","VALPARAISO":"Valparaíso","METROPOLITANA":"Metropolitana de Santiago","OHIGGINS":"O'Higgins","MAULE":"Maule","NUBLE":"Ñuble","BIO BIO":"Biobío","LA ARAUCANIA":"La Araucanía","LOS RIOS":"Los Ríos","LOS LAGOS":"Los Lagos","AYSEN":"Aysén","MAGALLANES":"Magallanes"};
    const COMUNAS_OFICIALES_POR_REGION = window.COMUNAS_OFICIALES_POR_REGION || {};
    const COMUNAS_ALIAS_POR_REGION = window.COMUNAS_ALIAS_POR_REGION || {};
    function norm(str) { return String(str || "").replace(/^\uFEFF/, "").toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim(); }
    function limpiarHeader(str) { return String(str || "").replace(/^\uFEFF/, "").trim(); }
    function detectarSeparador(primeraLinea) { const semicolons = (primeraLinea.match(/;/g) || []).length; const commas = (primeraLinea.match(/,/g) || []).length; return semicolons > commas ? ";" : ","; }
    function parsearCSV(csv) {
        const lineas = csv.replace(/\r\n/g, "\n").replace(/\r/g, "\n").trim().split("\n");
        if (lineas.length < 2) return { datos: [], headers: [] };
        const sep = detectarSeparador(lineas[0]);
        function splitLinea(linea) {
            const cols = []; let inQuote = false; let current = "";
            for (let i = 0; i < linea.length; i++) {
                const c = linea[i];
                if (c === '"') {
                    if (inQuote && linea[i + 1] === '"') { current += '"'; i++; } else { inQuote = !inQuote; }
                } else if (c === sep && !inQuote) { cols.push(current.trim()); current = ""; } else { current += c; }
            }
            cols.push(current.trim());
            return cols.map((valor) => valor.replace(/^"|"$/g, "").trim());
        }
        const headers = splitLinea(lineas[0]).map(limpiarHeader);
        const datos = [];
        for (let i = 1; i < lineas.length; i++) {
            if (!lineas[i].trim()) continue;
            const valores = splitLinea(lineas[i]);
            const fila = {};
            headers.forEach((h, j) => { fila[h] = (valores[j] || "").trim(); });
            datos.push(fila);
        }
        return { datos, headers };
    }
    function buscarColumna(headers, candidatos) { const headersNorm = headers.map(norm); for (const cand of candidatos) { const idx = headersNorm.indexOf(norm(cand)); if (idx !== -1) return headers[idx]; } return null; }
    function buscarColumnaAproximada(headers, matcher) { for (const header of headers) { if (matcher(norm(header), header)) return header; } return null; }
    function buscarColumnasEstado(headers) { return headers.filter((header) => norm(header).startsWith("ESTADO")); }
    function extraerMesDesdeColumna(nombre) { return norm(nombre).replace(/^ESTADO_?/, "").trim(); }
    function normalizarEstado(valor) { const estado = norm(valor); if (!estado) return "SIN ESTADO"; if (estado.includes("NO VIGENTE")) return "NO VIGENTE"; if (estado.includes("NO ACREDITADO")) return "NO ACREDITADO"; if (estado === "ACREDITADO") return "ACREDITADO"; return estado; }
    function comunaClave(valor) {
        return norm(valor).replace(/[^A-Z0-9]/g, "");
    }
    function obtenerIndiceComunasOficiales() {
        if (window.__COMUNAS_OFICIALES_INDEX) return window.__COMUNAS_OFICIALES_INDEX;
        const indice = {};
        Object.entries(COMUNAS_OFICIALES_POR_REGION).forEach(([region, comunas]) => {
            indice[region] = {};
            comunas.forEach((comuna) => {
                indice[region][comunaClave(comuna)] = comuna;
            });
            Object.entries(COMUNAS_ALIAS_POR_REGION[region] || {}).forEach(([alias, oficial]) => {
                indice[region][comunaClave(alias)] = oficial;
            });
        });
        window.__COMUNAS_OFICIALES_INDEX = indice;
        return indice;
    }
    function normalizarComunaPorRegion(region, valor) {
        if (region === "NIVEL CENTRAL") return "Nivel Central";
        const texto = String(valor || "").trim();
        if (!texto || norm(texto) === "0") return "Sin información de comuna";
        const oficiales = obtenerIndiceComunasOficiales();
        const comunasRegion = oficiales[region];
        if (!comunasRegion) return "Sin información de comuna";
        const match = comunasRegion[comunaClave(texto)];
        return match || "Sin información de comuna";
    }
    function construirUrlSinCache(url) {
        const limpia = String(url || "").trim();
        if (!limpia) return "";
        const separador = limpia.includes("?") ? "&" : "?";
        return `${limpia}${separador}_ts=${Date.now()}`;
    }
    function normalizarRegion(valor) {
        const texto = String(valor || "").trim();
        if (!texto) return "NIVEL CENTRAL";
        const normalizado = texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^\w\s]/g, " ").replace(/\s+/g, " ").trim().toUpperCase();
        if (!normalizado || normalizado === "0" || normalizado === "SIN REGION") return "NIVEL CENTRAL";
        if (normalizado.includes("NIVEL CENTRAL")) return "NIVEL CENTRAL";
        if (normalizado.includes("ARICA")) return "ARICA Y PARINACOTA";
        if (normalizado.includes("TARAPACA")) return "TARAPACA";
        if (normalizado.includes("ANTOFAGASTA")) return "ANTOFAGASTA";
        if (normalizado.includes("ATACAMA")) return "ATACAMA";

    const doughnutPercentageLabels = {

        afterDatasetsDraw(chart) {
            const dataset = chart.data.datasets[0];
            const meta = chart.getDatasetMeta(0);
            if (!dataset || !meta || !meta.data || !meta.data.length) return;
            const total = dataset.data.reduce((acc, value) => acc + Number(value || 0), 0);
            if (!total) return;
            const { ctx } = chart;
            ctx.save();
            ctx.font = "700 11px Segoe UI";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            meta.data.forEach((arc, index) => {
                const valor = Number(dataset.data[index] || 0);
                if (!valor) return;
                const porcentaje = (valor / total) * 100;
                if (porcentaje < 4) return;
                const angle = (arc.startAngle + arc.endAngle) / 2;
                const radius = arc.innerRadius + (arc.outerRadius - arc.innerRadius) * 0.58;
                const x = arc.x + Math.cos(angle) * radius;
                const y = arc.y + Math.sin(angle) * radius;
                ctx.fillStyle = "#ffffff";
                ctx.strokeStyle = "rgba(15, 23, 42, 0.22)";
                ctx.lineWidth = 3;
                const etiqueta = `${porcentaje.toFixed(1)}%`;
                ctx.strokeText(etiqueta, x, y);
                ctx.fillText(etiqueta, x, y);
            });
            ctx.restore();
        }

    function procesarDatos(datos, cols) {
        const { colRegion, colComuna, colDependeDe, columnasEstado } = cols;

                const comuna = normalizarComunaPorRegion(region, colComuna ? fila[colComuna] : "");

                resumen.total++;

                    resumen.porRegion[region] = {
                        Region: region, RegionEtiqueta: ETIQUETAS_REGION[region] || region, OrdenRegion: obtenerOrdenRegion(region),

                        else if (institucion === "SEREMI") resumen.porRegion[region].NoVigenteSeremi++;
                        else resumen.porRegion[region].NoVigenteOtras++;
                    }
                }
                else if (estado === "NO ACREDITADO") {
                    resumen.noAcreditado++; resumen.porRegion[region].NoAcreditado++;
                    if (region !== "NIVEL CENTRAL") {
                        if (institucion === "MUNICIPALIDAD") resumen.porRegion[region].NoAcreditadoMunicipalidad++;
                        else if (institucion === "SEREMI") resumen.porRegion[region].NoAcreditadoSeremi++;
                        else resumen.porRegion[region].NoAcreditadoOtras++;
                    }
                }
                else { resumen.sinEstado++; resumen.porRegion[region].SinEstado++; }
                if (colComuna) {
                    resumen.hasComunaData = true;
                    if (!resumen.porRegion[region].porComuna[comuna]) {
                        resumen.porRegion[region].porComuna[comuna] = {
                            Comuna: comuna, Total: 0, Acreditado: 0, NoVigente: 0, NoAcreditado: 0, SinEstado: 0,
                            Municipalidad: 0, Seremi: 0, OtrasInstituciones: 0,
                            AcreditadoMunicipalidad: 0, AcreditadoSeremi: 0, AcreditadoOtras: 0,
                            NoVigenteMunicipalidad: 0, NoVigenteSeremi: 0, NoVigenteOtras: 0,
                            NoAcreditadoMunicipalidad: 0, NoAcreditadoSeremi: 0, NoAcreditadoOtras: 0,
                            TasaAcreditado: 0
                        };
                    }
                    resumen.porRegion[region].porComuna[comuna].Total++;
                    if (region !== "NIVEL CENTRAL") {
                        if (institucion === "MUNICIPALIDAD") resumen.porRegion[region].porComuna[comuna].Municipalidad++;
                        else if (institucion === "SEREMI") resumen.porRegion[region].porComuna[comuna].Seremi++;
                        else resumen.porRegion[region].porComuna[comuna].OtrasInstituciones++;
                    }
                    if (estado === "ACREDITADO") {
                        resumen.porRegion[region].porComuna[comuna].Acreditado++;
                        if (region !== "NIVEL CENTRAL") {
                            if (institucion === "MUNICIPALIDAD") resumen.porRegion[region].porComuna[comuna].AcreditadoMunicipalidad++;
                            else if (institucion === "SEREMI") resumen.porRegion[region].porComuna[comuna].AcreditadoSeremi++;
                            else resumen.porRegion[region].porComuna[comuna].AcreditadoOtras++;
                        }
                    }
                    else if (estado === "NO VIGENTE") {
                        resumen.porRegion[region].porComuna[comuna].NoVigente++;
                        if (region !== "NIVEL CENTRAL") {
                            if (institucion === "MUNICIPALIDAD") resumen.porRegion[region].porComuna[comuna].NoVigenteMunicipalidad++;
                            else if (institucion === "SEREMI") resumen.porRegion[region].porComuna[comuna].NoVigenteSeremi++;
                            else resumen.porRegion[region].porComuna[comuna].NoVigenteOtras++;
                        }
                    }
                    else if (estado === "NO ACREDITADO") {
                        resumen.porRegion[region].porComuna[comuna].NoAcreditado++;
                        if (region !== "NIVEL CENTRAL") {
                            if (institucion === "MUNICIPALIDAD") resumen.porRegion[region].porComuna[comuna].NoAcreditadoMunicipalidad++;
                            else if (institucion === "SEREMI") resumen.porRegion[region].porComuna[comuna].NoAcreditadoSeremi++;

                    }
                    else resumen.porRegion[region].porComuna[comuna].SinEstado++;

            });
            resumen.porRegion = Object.values(resumen.porRegion).map((fila) => ({
                ...fila,
                TasaAcreditado: fila.Total > 0 ? (fila.Acreditado / fila.Total) * 100 : 0,

                    ...comunaFila,
                    TasaAcreditado: comunaFila.Total > 0 ? (comunaFila.Acreditado / comunaFila.Total) * 100 : 0
                })).sort((a, b) => {
                    const aSinComuna = a.Comuna === "Sin información de comuna";
                    const bSinComuna = b.Comuna === "Sin información de comuna";
                    if (aSinComuna && !bSinComuna) return 1;
                    if (!aSinComuna && bSinComuna) return -1;
                    return a.Comuna.localeCompare(b.Comuna, "es-CL");
                })
            })).sort((a, b) => a.OrdenRegion - b.OrdenRegion);

        });

    function obtenerHallazgos(monthData, prevMonthData) {
        const regiones = monthData.porRegion.filter((r) => r.Total > 0 && r.Region !== "NIVEL CENTRAL");
        const topNumero = [...regiones].sort((a, b) => b.Total - a.Total)[0];
        const topAcreditacion = [...regiones].filter((r) => r.Total >= 200).sort((a, b) => b.TasaAcreditado - a.TasaAcreditado)[0];
        const topNoVigente = [...regiones].sort((a, b) => b.NoVigente - a.NoVigente)[0];
        const diffAcreditado = prevMonthData ? monthData.acreditado - prevMonthData.acreditado : 0;
        return [
            `${monthData.label}: número de personas acreditadas ${fmt(monthData.acreditado)}, número de personas no vigentes ${fmt(monthData.noVigente)} y número de personas no acreditadas ${fmt(monthData.noAcreditado)}.`,
            topNumero ? `${topNumero.RegionEtiqueta} concentra el mayor número de registros del mes, con ${fmt(topNumero.Total)} registros.` : "No hay información regional disponible.",
            topAcreditacion ? `${topAcreditacion.RegionEtiqueta} presenta el mayor porcentaje de acreditación entre regiones con al menos 200 registros, alcanzando ${topAcreditacion.TasaAcreditado.toFixed(1)}%.` : "No hay suficiente base para comparar porcentajes regionales.",
            topNoVigente ? `${topNoVigente.RegionEtiqueta} registra el mayor número de personas no vigentes, con ${fmt(topNoVigente.NoVigente)} registros.` : "No se identificaron concentraciones relevantes de no vigencia.",
            prevMonthData ? `La variación mensual del número de personas acreditadas es ${diffAcreditado > 0 ? "+" : ""}${fmt(diffAcreditado)} respecto de ${prevMonthData.label}.` : "No existe un mes previo informado para calcular variación mensual."
        ];
    }
    function obtenerAlertas(monthData, prevMonthData) {
        const alertas = [];
        const regiones = monthData.porRegion.filter((r) => r.Total > 0 && r.Region !== "NIVEL CENTRAL");
        const altaNoVigencia = [...regiones].filter((r) => r.NoVigente / r.Total >= 0.45).sort((a, b) => (b.NoVigente / b.Total) - (a.NoVigente / a.Total))[0];
        const bajaAcreditacion = [...regiones].filter((r) => r.Total >= 200 && r.TasaAcreditado < 12).sort((a, b) => a.TasaAcreditado - b.TasaAcreditado)[0];
        const altaNoAcreditacion = [...regiones].filter((r) => r.NoAcreditado / r.Total >= 0.35).sort((a, b) => (b.NoAcreditado / b.Total) - (a.NoAcreditado / a.Total))[0];
        if (altaNoVigencia) {
            alertas.push(`Seguimiento sugerido: ${altaNoVigencia.RegionEtiqueta} presenta un porcentaje de no vigencia de ${((altaNoVigencia.NoVigente / altaNoVigencia.Total) * 100).toFixed(1)}%.`);
        }
        if (bajaAcreditacion) {
            alertas.push(`Atención: ${bajaAcreditacion.RegionEtiqueta} registra un porcentaje de acreditación de ${bajaAcreditacion.TasaAcreditado.toFixed(1)}%, bajo el umbral de referencia de 12,0%.`);
        }
        if (altaNoAcreditacion) {
            alertas.push(`Revisión prioritaria: ${altaNoAcreditacion.RegionEtiqueta} concentra ${((altaNoAcreditacion.NoAcreditado / altaNoAcreditacion.Total) * 100).toFixed(1)}% de personas no acreditadas dentro de su total regional.`);
        }
        if (prevMonthData) {
            const deltaNoVigente = monthData.noVigente - prevMonthData.noVigente;
            if (deltaNoVigente > 500) {
                alertas.push(`Variación mensual relevante: el número de personas no vigentes aumenta en ${fmt(deltaNoVigente)} respecto de ${prevMonthData.label}.`);
            }
            const deltaAcreditado = monthData.acreditado - prevMonthData.acreditado;
            if (deltaAcreditado < -500) {
                alertas.push(`Variación mensual relevante: el número de personas acreditadas disminuye en ${fmt(deltaAcreditado)} respecto de ${prevMonthData.label}.`);
            }
        }
        if (alertas.length === 0) {
            alertas.push("No se detectan alertas prioritarias para el mes seleccionado según los umbrales definidos.");
        }
        return alertas;
    }

    function descargarExcel(nombre, titulo, headers, filas) {
        const widths = headers.map((header, index) => {

        });

        const blob = new Blob([html], { type: "application/vnd.ms-excel;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = nombre;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);

    function cerrarMenuExportacion() { const menu = document.getElementById("exportMenu"); if (menu) menu.classList.remove("visible"); }
    function abrirDetalleRegion(region) {
        const monthData = obtenerMesActual();
        if (!monthData) return;
        const regionData = monthData.porRegion.find((item) => item.Region === region) || obtenerResumenVacio(region, ETIQUETAS_REGION[region] || region);
        modalRegionActual = regionData.Region;
        regionSeleccionada = regionData.Region;
        const esNivelCentral = regionData.Region === "NIVEL CENTRAL";
        document.getElementById("comunaModalTitle").textContent = regionData.RegionEtiqueta;
        const subtituloBase = `Mes visualizado: ${monthData.label}.`;
        const encabezado = document.getElementById("comunaModalSectionTitle");
        if (encabezado) encabezado.textContent = esNivelCentral ? "Resumen del nivel central" : "Desglose por comuna";
        document.getElementById("comunaModalSubtitle").textContent = esNivelCentral
            ? `${subtituloBase} Resumen del número de personas registradas en Nivel Central.`
            : (dashboardData.hasComunaData
                ? `${subtituloBase} Desglose del número de personas por comuna dentro de la región seleccionada.`
                : `${subtituloBase} La fuente publicada actual no incluye una columna de comuna; agrega una columna COMUNA para habilitar este detalle.`);
        const contenedor = document.getElementById("comunaModalContent");
        if (!dashboardData.hasComunaData) {
            contenedor.innerHTML = `<div class="modal-empty">La base publicada hoy no trae una columna de comuna. En cuanto el CSV incorpore una columna como <strong>COMUNA</strong>, <strong>NOMBRE_COMUNA</strong> o similar, este desglose se activará automáticamente al hacer clic en cada región.</div>`;
        } else {
        const filasComuna = regionData.porComuna.map((c, index) => `
                <tr class="${index % 2 === 0 ? "region-group-par" : "region-group-impar"}">
                    <td>${c.Comuna}</td>
                    <td>${fmt(c.Acreditado)}</td>
                    <td class="percent-cell"><div class="data-bar"><div class="data-fill" style="width:${Math.min(regionData.Acreditado > 0 ? (c.Acreditado / regionData.Acreditado) * 100 : 0, 100).toFixed(1)}%"></div></div>${badgeTasa(regionData.Acreditado > 0 ? (c.Acreditado / regionData.Acreditado) * 100 : 0)}</td>
                    <td>${fmt(c.NoVigente)}</td>
                    <td>${fmt(c.NoAcreditado)}</td>
                    <td>${fmt(c.Total)}</td>
                </tr>
                ${renderSubfilasInstitucion(c, false, regionData.Acreditado, "regional").replaceAll('class=\"subfila-institucion\"', `class=\"subfila-institucion ${index % 2 === 0 ? "region-group-par" : "region-group-impar"}\"`)}
            `).join("");
            contenedor.innerHTML = `
                <div class="modal-grid">
                    <div class="modal-stat"><div class="modal-stat-label">N° de personas registradas</div><div class="modal-stat-value">${fmt(regionData.Total)}</div></div>
                    <div class="modal-stat"><div class="modal-stat-label">N° de personas acreditadas</div><div class="modal-stat-value">${fmt(regionData.Acreditado)}</div></div>
                    <div class="modal-stat"><div class="modal-stat-label">N° de personas no vigentes</div><div class="modal-stat-value">${fmt(regionData.NoVigente)}</div></div>
                    <div class="modal-stat"><div class="modal-stat-label">N° de personas no acreditadas</div><div class="modal-stat-value">${fmt(regionData.NoAcreditado)}</div></div>
                </div>
                ${esNivelCentral ? "" : `<div class="table-section" style="padding:0; border:none; box-shadow:none;">
                    <div class="section-note" style="padding:0 0 10px 0;">No vigente corresponde a personas que estuvieron acreditadas en períodos anteriores, pero no cuentan con vigencia actual.</div>
                    <div class="section-title" style="padding:0 0 8px 0;">Estados por comuna</div>
                    <table>
                        <thead>
                            <tr><th rowspan="2">Comuna</th><th rowspan="2">Personas acreditadas</th><th rowspan="2">% de personas acreditadas, respecto total regional</th><th colspan="2">Personas sin acreditación vigente</th><th rowspan="2">Total</th></tr>
                            <tr><th>No vigente</th><th>No acreditado</th></tr>
                        </thead>
                        <tbody>${filasComuna}</tbody>
                    </table>
                </div>`}
            `;
        }
        document.getElementById("comunaModal").classList.add("visible");
    }
    function cerrarModalComuna(event) {
        if (event && event.target && event.target !== event.currentTarget) return;
        modalRegionActual = null;
        document.getElementById("comunaModal").classList.remove("visible");
    }
    function renderDashboard() {
        const monthData = dashboardData.monthly[currentMonthIndex];
        const prevMonthData = currentMonthIndex > 0 ? dashboardData.monthly[currentMonthIndex - 1] : null;
        const hallazgos = obtenerHallazgos(monthData, prevMonthData);
        const alertas = obtenerAlertas(monthData, prevMonthData);
        const deltaAcreditado = obtenerDelta(monthData.acreditado, prevMonthData ? prevMonthData.acreditado : monthData.acreditado);
        const deltaNoVigente = obtenerDelta(monthData.noVigente, prevMonthData ? prevMonthData.noVigente : monthData.noVigente);
        const deltaNoAcreditado = obtenerDelta(monthData.noAcreditado, prevMonthData ? prevMonthData.noAcreditado : monthData.noAcreditado);
        const deltaTotal = obtenerDelta(monthData.total, prevMonthData ? prevMonthData.total : monthData.total);
        const filasRegion = monthData.porRegion.map((r, index) => `
            <tr class="${index % 2 === 0 ? "region-group-par" : "region-group-impar"}">
                <td><button type="button" class="region-cell-button" onclick="abrirDetalleRegion('${r.Region.replace(/'/g, "\\'")}')">${r.RegionEtiqueta}</button></td>
                <td>${fmt(r.Acreditado)}</td>
                <td class="percent-cell"><div class="data-bar"><div class="data-fill" style="width:${Math.min(monthData.acreditado > 0 ? (r.Acreditado / monthData.acreditado) * 100 : 0, 100).toFixed(1)}%"></div></div>${badgeTasa(monthData.acreditado > 0 ? (r.Acreditado / monthData.acreditado) * 100 : 0)}</td>
                <td>${fmt(r.NoVigente)}</td>
                <td>${fmt(r.NoAcreditado)}</td>
                <td>${fmt(r.Total)}</td>
            </tr>
                ${renderSubfilasInstitucion(r, r.Region === "NIVEL CENTRAL", monthData.acreditado, "nacional").replaceAll('class=\"subfila-institucion\"', `class=\"subfila-institucion ${index % 2 === 0 ? "region-group-par" : "region-group-impar"}\"`)}
        `).join("");
        const filaTotales = `
            <tr>
                <td><strong>Total</strong></td>
                <td><strong>${fmt(monthData.acreditado)}</strong></td>
                <td class="percent-cell"><div class="data-bar"><div class="data-fill" style="width:100%"></div></div><strong>${badgeTasa(100)}</strong></td>
                <td><strong>${fmt(monthData.noVigente)}</strong></td>
                <td><strong>${fmt(monthData.noAcreditado)}</strong></td>
                <td><strong>${fmt(monthData.total)}</strong></td>
            </tr>
        `;
        document.getElementById("content").innerHTML = `
            <div class="executive-band">
                <div class="panel executive-main"><div class="executive-title">Lectura ejecutiva</div><div class="executive-text">${hallazgos[0]}</div></div>
                <div class="panel executive-side"><div class="executive-title">Contexto del corte</div><div class="executive-text">Mes visualizado: <strong>${monthData.label}</strong><br>N° de registros: <strong>${fmt(monthData.total)}</strong><br>Comparación: <strong>${prevMonthData ? prevMonthData.label : "Sin mes previo"}</strong></div></div>
            </div>
            <div class="panel toolbar">
                <div><div class="toolbar-title">Seleccionar mes</div><div class="month-group">${buildMonthButtons()}</div></div>
                <div class="toolbar-actions">
                    <div class="toolbar-meta"><div><strong>Fuente:</strong> Sistema de Información Social en Emergencias</div></div>
                    <div class="export-wrap">
                        <button type="button" class="export-btn" onclick="toggleMenuExportacion()">Exportar datos</button>
                        <div class="export-menu" id="exportMenu">
                            <button type="button" class="export-option" onclick="exportarRegional()">Descargar resumen nacional por región</button>
                            <button type="button" class="export-option" onclick="exportarComunalNacional()" ${dashboardData.hasComunaData ? "" : "disabled"}>Descargar resumen nacional por comuna</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="kpi-section">
                <div class="kpi-card azul"><div class="kpi-label">N° de personas registradas</div><div class="kpi-value">${fmt(dashboardData.totalPersonas)}</div><div class="kpi-percent">Recuento de RUN únicos de los meses consolidados.</div></div>
                <div class="kpi-card verde"><div class="kpi-label">N° de personas acreditadas</div><div class="kpi-value">${fmt(monthData.acreditado)}</div><div class="kpi-percent">${pct(monthData.acreditado, monthData.total)} del total de registros de ${monthData.label}</div><div class="kpi-delta ${deltaAcreditado.className}">${deltaAcreditado.label}</div></div>
                <div class="kpi-card ambar"><div class="kpi-label">N° de personas no vigentes</div><div class="kpi-value">${fmt(monthData.noVigente)}</div><div class="kpi-percent">${pct(monthData.noVigente, monthData.total)} del total de registros de ${monthData.label}</div><div class="kpi-delta ${deltaNoVigente.className}">${deltaNoVigente.label}</div></div>
                <div class="kpi-card rojo"><div class="kpi-label">N° de personas no acreditadas</div><div class="kpi-value">${fmt(monthData.noAcreditado)}</div><div class="kpi-percent">${pct(monthData.noAcreditado, monthData.total)} del total de registros de ${monthData.label}</div><div class="kpi-delta ${deltaNoAcreditado.className}">${deltaNoAcreditado.label}</div></div>
            </div>
            <div class="charts-section">
                <div class="chart-card"><div class="section-title">Tendencia mensual por estado</div><div class="section-note">Permite comparar la evolución del número de personas acreditadas, no vigentes y no acreditadas entre meses informados.</div><div class="chart-canvas-wrap"><canvas id="trendChart"></canvas></div></div>
                <div class="chart-card"><div class="section-title">Distribución por estado</div><div class="section-note">Resumen compacto del mes seleccionado, con colores semánticos consistentes en todo el tablero.</div><div class="chart-canvas-wrap compact"><canvas id="estadoChart"></canvas></div></div>
            </div>
            <div class="mid-section">
                <div class="table-section"><div class="section-title">Estados por región</div><div class="section-note">${dashboardData.hasComunaData ? "Haz clic en una región para ver el desglose por comuna." : "Haz clic en una región para revisar el detalle disponible. La fuente actual todavía no incorpora comuna."}</div><div class="section-note" style="margin-top:-2px; margin-bottom:10px;">No vigente corresponde a personas que estuvieron acreditadas en períodos anteriores, pero no cuentan con vigencia actual.</div><table><thead><tr><th rowspan="2">Región</th><th rowspan="2">Personas acreditadas</th><th rowspan="2">% de personas acreditadas, respecto total nacional</th><th colspan="2">Personas sin acreditación vigente</th><th rowspan="2">Total</th></tr><tr><th>No vigente</th><th>No acreditado</th></tr></thead><tbody>${filasRegion}${filaTotales}</tbody></table></div>
                <div style="display:grid; gap:16px; align-content:start;"><div class="insight-card"><div class="section-title">Hallazgos clave</div><div class="insight-list">${hallazgos.slice(1).map((item) => `<div class="insight-item">${item}</div>`).join("")}</div></div><div class="insight-card"><div class="section-title">Alertas clave</div><div class="insight-list">${alertas.map((item) => `<div class="insight-item">${item}</div>`).join("")}</div></div></div>
            </div>
            <div class="footer-card"><div class="section-title">Notas metodológicas</div><div class="footer-grid"><div class="footer-item"><strong>Fuente</strong>Sistema de Información Social en Emergencias.</div><div class="footer-item metodologia"><strong>Metodología</strong>Cada vista mensual utiliza la columna de estado correspondiente al mes seleccionado. Las regiones vacías, con valor cero o sin clasificación se consolidan en Nivel Central. La información territorial es reportada por la persona usuaria, por lo que pueden presentarse diferencias entre región y comuna. Cuando la comuna informada no corresponde a la región registrada, se clasifica como "Sin información de comuna".</div></div></div>
        `;
        crearGraficos(monthData);
    }
    function procesarTextoCsv(text, origenLabel) {
        const { datos, headers } = parsearCSV(text);
        if (datos.length === 0) {
            throw new Error("El archivo está vacío o no tiene filas de datos.");
        }
        const colRegion = buscarColumna(headers, ["REGION", "REGIÓN", "REGION_NOMBRE", "NOM_REGION", "NOMBRE_REGION"]) || buscarColumnaAproximada(headers, (n) => n.startsWith("REGI") || n.includes("REGION"));
        const colComuna = buscarColumna(headers, ["COMUNA", "NOMBRE_COMUNA", "NOM_COMUNA", "COMUNA_NOMBRE", "GLOSA_COMUNA"]) || buscarColumnaAproximada(headers, (n) => n.includes("COMUNA"));
        const colDependeDe = buscarColumna(headers, ["DEPENDE DE", "DEPENDE_DE", "DEPENDENCIA", "INSTITUCION", "INSTITUCIÓN"]);
        const columnasEstado = buscarColumnasEstado(headers).filter((h) => datos.some((fila) => String(fila[h] || "").trim() !== ""));
        if (columnasEstado.length === 0) {
            throw new Error("No se encontraron columnas de estado válidas. Se esperaban columnas como ESTADO_ENERO, ESTADO_FEBRERO o ESTADO_MARZO.");
        }
        dashboardData = procesarDatos(datos, { colRegion, colComuna, colDependeDe, columnasEstado });
        currentMonthIndex = Math.max(dashboardData.monthly.length - 1, 0);
        renderDashboard();
        if (origenLabel) mostrarInfo(`Fuente cargada: ${origenLabel}`);
    }
    function crearGraficos(monthData) {
        const ctxEstado = document.getElementById("estadoChart");
        const ctxTrend = document.getElementById("trendChart");
        if (!ctxEstado || !ctxTrend) return;
        if (chartEstado) chartEstado.destroy();
        if (chartTendencia) chartTendencia.destroy();
        if (chartRegion) chartRegion.destroy();
        chartEstado = new Chart(ctxEstado, {
            plugins: [doughnutPercentageLabels],
            type: "doughnut",
            data: {
                labels: ["ACREDITADO", "NO VIGENTE", "NO ACREDITADO", "SIN ESTADO"],
                datasets: [{ data: [monthData.acreditado, monthData.noVigente, monthData.noAcreditado, monthData.sinEstado], backgroundColor: ["#1a7a4a", "#b45309", "#b91c1c", "#64748b"], borderColor: "#ffffff", borderWidth: 2 }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: "bottom", labels: { font: { size: 11 }, boxWidth: 12 } } ,
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const total = context.dataset.data.reduce((acc, value) => acc + Number(value || 0), 0);
                                const valor = Number(context.raw || 0);
                                const porcentaje = total > 0 ? ((valor / total) * 100).toFixed(1) : "0.0";
                                return `${context.label}: ${porcentaje}%`;
                            }
                        }
                    }
                },
                cutout: "64%"
            }
        });
        chartTendencia = new Chart(ctxTrend, {
            type: "line",
            data: {
                labels: dashboardData.monthly.map((m) => m.label),
                datasets: [
                    { label: "ACREDITADO", data: dashboardData.monthly.map((m) => m.acreditado), borderColor: "#1a7a4a", backgroundColor: "rgba(26,122,74,0.12)", pointBackgroundColor: "#1a7a4a", pointRadius: 4, tension: 0.25, fill: false },
                    { label: "NO VIGENTE", data: dashboardData.monthly.map((m) => m.noVigente), borderColor: "#b45309", backgroundColor: "rgba(180,83,9,0.12)", pointBackgroundColor: "#b45309", pointRadius: 4, tension: 0.25, fill: false },
                    { label: "NO ACREDITADO", data: dashboardData.monthly.map((m) => m.noAcreditado), borderColor: "#b91c1c", backgroundColor: "rgba(185,28,28,0.12)", pointBackgroundColor: "#b91c1c", pointRadius: 4, tension: 0.25, fill: false }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: "bottom", labels: { font: { size: 12 } } } },
                scales: { x: { ticks: { font: { size: 11 } }, grid: { display: false } }, y: { beginAtZero: true, ticks: { font: { size: 11 } } } }
            }
        });
    }
    function seleccionarMes(index) { currentMonthIndex = index; renderDashboard(); }
    async function cargarDatosPublicados() {
        mostrarError("");
        mostrarInfo("Cargando datos automáticamente desde la fuente publicada...");
        try {
            const urlDescarga = construirUrlSinCache(AUTO_CSV_URL);
            const response = await fetch(urlDescarga, { cache: "no-store" });
            if (!response.ok) {
                throw new Error(`No fue posible descargar el CSV (${response.status}).`);
            }
            const text = await response.text();
            procesarTextoCsv(text, AUTO_CSV_URL);
            mostrarInfo("");
        } catch (error) {
            mostrarError("Error al cargar la fuente publicada: " + error.message);
        }
    }

    window.addEventListener("DOMContentLoaded", () => {
        cargarDatosPublicados();
    });
    window.addEventListener("click", (event) => {
        const wrap = document.querySelector(".export-wrap");
        if (wrap && !wrap.contains(event.target)) cerrarMenuExportacion();
    });
</script>
</body>
</html>
