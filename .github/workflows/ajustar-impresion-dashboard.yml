name: Ajustar impresión del dashboard

on:
  push:
    paths:
      - '.github/workflows/ajustar-impresion-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ajustar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Cambiar acción del botón de impresión
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('emergencias/index.html')
          text = path.read_text(encoding='utf-8')
          old = '<button class="btn" onclick="window.print()">Imprimir / guardar PDF</button>'
          new = '<button class="btn" onclick="window.open(\'imprimir.html\', \'_blank\')">Imprimir / guardar PDF</button>'
          if old not in text:
              raise SystemExit('No se encontró el botón de impresión esperado.')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Publicar cambio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add emergencias/index.html
          git diff --cached --quiet && exit 0
          git commit -m "Usar reporte imprimible corregido desde Acciones"
          git push
